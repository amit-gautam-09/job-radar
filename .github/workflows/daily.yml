name: daily-radar
on:
  schedule:
    - cron: "30 11 * * *"     # 11:30 UTC = 17:00 IST (India has no DST)
  workflow_dispatch:           # manual runs for testing
permissions:
  contents: write              # to commit state/seen.json
concurrency:
  group: radar
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Run radar
        run: python -m src.main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # optional
      - name: Commit state
        if: always()   # persist any written seen.json even if the run exits non-zero (unhealthy)
        run: |
          git config user.name "job-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || git commit -m "radar: state update [skip ci]"
          git push
